<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Modifica Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-warning"><h2>Modifica Cliente</h2></div>
        <div class="card-body">
            <form th:action="@{/aggiorna}" th:object="${cliente}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label>Nome</label>
                    <input type="text" th:field="*{nome}" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Telefono</label>
                    <input type="text" th:field="*{telefono}" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary">Salva Modifiche</button>
                <a href="/" class="btn btn-secondary">Annulla</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
