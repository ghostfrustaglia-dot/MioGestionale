<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Magazzino</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Gestionale Pro</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/clienti">Clienti</a>
            <a class="nav-link active" href="/magazzino">Magazzino</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Anagrafica Clienti</h2>
        <a href="/clienti/esporta" class="btn btn-outline-secondary btn-sm">📥 Scarica Elenco</a>
    </div>

    <div class="card mb-4 border-0 shadow-sm">
        <div class="card-body">
            <form action="/clienti/importa" method="post" enctype="multipart/form-data" class="row g-2">
                <div class="col-md-9">
                    <input type="file" name="file" class="form-control" accept=".csv, .txt" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-info w-100 text-white">📥 Importa CSV</button>
                </div>
            </form>
            <small class="text-muted">Il file deve essere nel formato: Nome,Email,Telefono</small>
        </div>
    </div>

<div class="container">
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white text-center"><h5>Nuovo Prodotto</h5></div>
        <div class="card-body">
            <form action="/magazzino/aggiungi" method="post" class="row g-3">
                <div class="col-md-4"><input type="text" name="nome" class="form-control" placeholder="Nome Prodotto" required></div>
                <div class="col-md-3"><input type="number" name="quantita" class="form-control" placeholder="Quantità" required></div>
                <div class="col-md-3"><input type="number" step="0.01" name="prezzo" class="form-control" placeholder="Prezzo (€)" required></div>
                <div class="col-md-2"><button type="submit" class="btn btn-success w-100">Carica</button></div>
            </form>
        </div>
    </div>

    <table class="table table-hover bg-white rounded shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th><th>Prodotto</th><th>Quantità</th><th>Prezzo</th><th>Azioni</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${listaProdotti}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.nome}"></td>
            <td th:text="${p.quantita}"></td>
            <td th:text="${p.prezzo} + ' €'"></td>
            <td>
                <form action="/magazzino/elimina" method="post">
                    <input type="hidden" name="id" th:value="${p.id}">
                    <button type="submit" class="btn btn-danger btn-sm">Elimina</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
