<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Clienti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Gestionale Pro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link active" href="/clienti">Clienti</a>
                <a class="nav-link" href="/magazzino">Magazzino</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Anagrafica Clienti</h2>
        <a href="/clienti/esporta" class="btn btn-outline-secondary btn-sm">📥 Scarica Elenco</a>
    </div>

    <div class="card mb-4 border-0 shadow-sm">
        <div class="card-body">
            <form action="/clienti/importa" method="post" enctype="multipart/form-data" class="row g-2">
                <div class="col-md-9">
                    <input type="file" name="file" class="form-control" accept=".csv, .txt" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-info w-100 text-white">📥 Importa CSV</button>
                </div>
            </form>
            <small class="text-muted">Il file deve essere nel formato: Nome,Email,Telefono</small>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-success text-white">Nuovo Cliente</div>
        <div class="card-body">
            <form action="/clienti/aggiungi" method="post" class="row g-3">
                <div class="col-md-4">
                    <input type="text" name="nome" class="form-control" placeholder="Nome e Cognome" required>
                </div>
                <div class="col-md-3">
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="col-md-3">
                    <input type="text" name="telefono" class="form-control" placeholder="Telefono">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Aggiungi</button>
                </div>
            </form>
        </div>
    </div>

    <form action="/clienti" method="get" class="d-flex mb-4 gap-2">
        <input type="text" name="keyword" class="form-control" placeholder="Cerca cliente per nome...">
        <button type="submit" class="btn btn-primary">Cerca</button>
        <a href="/clienti" class="btn btn-light">Reset</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover bg-white rounded shadow-sm">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefono</th>
                <th class="text-center">Azioni</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${listaClienti}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.nome}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.telefono}"></td>
                <td class="text-center">
                    <div class="d-flex justify-content-center gap-2">
                        <a th:href="@{'/modifica/' + ${c.id}}" class="btn btn-warning btn-sm">Modifica</a>
                        <form action="/clienti/elimina" method="post" onsubmit="return confirm('Eliminare il cliente?')">
                            <input type="hidden" name="id" th:value="${c.id}">
                            <button type="submit" class="btn btn-danger btn-sm">Elimina</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(listaClienti)}">
                <td colspan="5" class="text-center text-muted">Nessun cliente trovato.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
